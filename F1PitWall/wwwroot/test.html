<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>F1 Pitwall - SignalR Test</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            background: #0d1117;
            color: #c9d1d9;
        }
        h1 {
            color: #58a6ff;
            border-bottom: 2px solid #21262d;
            padding-bottom: 10px;
        }
        .status {
            padding: 15px;
            border-radius: 6px;
            margin: 20px 0;
            font-weight: bold;
            font-size: 18px;
        }
        .status.connecting {
            background: #1f2937;
            color: #fbbf24;
        }
        .status.connected {
            background: #064e3b;
            color: #10b981;
        }
        .status.error {
            background: #7f1d1d;
            color: #ef4444;
        }
        pre {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 6px;
            padding: 16px;
            overflow-x: auto;
            font-size: 14px;
            line-height: 1.5;
        }
        .section {
            margin: 30px 0;
        }
        .section h2 {
            color: #58a6ff;
            margin-bottom: 10px;
        }
        .info {
            background: #1f2937;
            padding: 10px 15px;
            border-radius: 6px;
            margin: 10px 0;
            font-size: 14px;
        }
        .driver-count {
            font-size: 24px;
            font-weight: bold;
            color: #10b981;
        }
    </style>
</head>
<body>
    <h1>🏎️ F1 Pitwall - SignalR Connection Test</h1>
    
    <div id="status" class="status connecting">🔄 Connecting to SignalR...</div>
    
    <div class="info">
        <strong>Endpoint:</strong> http://localhost:5018/hubs/timing<br>
        <strong>Active Drivers:</strong> <span id="driverCount" class="driver-count">0</span>
    </div>

    <div class="section">
        <h2>📊 Full State (Received on Connect)</h2>
        <pre id="fullState">Waiting for connection...</pre>
    </div>

    <div class="section">
        <h2>🔄 Live Updates (Real-time Stream)</h2>
        <pre id="liveUpdates">No updates yet...</pre>
    </div>

    <!-- Load SignalR from CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@microsoft/signalr@latest/dist/browser/signalr.min.js"></script>
    
    <script>
        // DOM elements
        const statusDiv = document.getElementById('status');
        const fullStateEl = document.getElementById('fullState');
        const liveUpdatesEl = document.getElementById('liveUpdates');
        const driverCountEl = document.getElementById('driverCount');

        let updateLog = [];
        const maxLogEntries = 20;

        // Create SignalR connection
        const connection = new signalR.HubConnectionBuilder()
            .withUrl("http://localhost:5018/hubs/timing")
            .configureLogging(signalR.LogLevel.Information)
            .build();

        // Handle full state (sent when you first connect)
        connection.on("ReceiveFullState", (state) => {
            console.log("📦 Full State Received:", state);
            
            fullStateEl.textContent = JSON.stringify(state, null, 2);
            
            // Count drivers
            const driverCount = state.drivers ? Object.keys(state.drivers).length : 0;
            driverCountEl.textContent = driverCount;
            
            if (driverCount === 0) {
                fullStateEl.textContent = "⚠️ No active F1 session - State is empty\n\n" + 
                                          JSON.stringify(state, null, 2);
            }
        });

        // Handle driver updates
        connection.on("ReceiveDriverUpdate", (driver) => {
            console.log("🏎️ Driver Update:", driver);
            addUpdateLog(`[Driver ${driver.driverNumber}] Position: ${driver.position || 'N/A'}, Speed: ${driver.speed || 'N/A'} km/h`);
        });

        // Handle position updates
        connection.on("ReceivePositionUpdate", (driverNumber, position) => {
            console.log(`📍 Position Update: Driver ${driverNumber} → P${position}`);
            addUpdateLog(`[Position] Driver ${driverNumber} is now P${position}`);
        });

        // Handle car data (telemetry)
        connection.on("ReceiveCarDataUpdate", (driverNumber, carData) => {
            console.log(`📡 Telemetry: Driver ${driverNumber}`, carData);
            addUpdateLog(`[Telemetry] Driver ${driverNumber} - Speed: ${carData.speed} km/h, Gear: ${carData.gear}`);
        });

        // Handle timing data (lap times)
        connection.on("ReceiveTimingDataUpdate", (driverNumber, timingData) => {
            console.log(`⏱️ Timing: Driver ${driverNumber}`, timingData);
            addUpdateLog(`[Timing] Driver ${driverNumber} - Last Lap: ${timingData.lastLapTime || 'N/A'}`);
        });

        // Handle pit stop updates
        connection.on("ReceivePitUpdate", (driverNumber, pitData) => {
            console.log(`🏁 Pit Stop: Driver ${driverNumber}`, pitData);
            addUpdateLog(`[Pit Stop] Driver ${driverNumber} - In Pit: ${pitData.inPit}, Tyres: ${pitData.tyreCompound || 'N/A'}`);
        });

        // Handle session status (Started, Finished, etc.)
        connection.on("ReceiveSessionStatus", (status) => {
            console.log(`🚦 Session Status: ${status}`);
            addUpdateLog(`[Session] Status changed to: ${status}`);
        });

        // Handle safety car status
        connection.on("ReceiveSafetyCarStatus", (status) => {
            console.log(`🚗 Safety Car: ${status}`);
            addUpdateLog(`[Safety Car] Status: ${status}`);
        });

        // Helper function to add log entries
        function addUpdateLog(message) {
            const timestamp = new Date().toLocaleTimeString();
            updateLog.unshift(`[${timestamp}] ${message}`);
            
            // Keep only last 20 entries
            if (updateLog.length > maxLogEntries) {
                updateLog = updateLog.slice(0, maxLogEntries);
            }
            
            liveUpdatesEl.textContent = updateLog.join('\n');
        }

        // Start the connection
        connection.start()
            .then(() => {
                console.log("✅ SignalR Connected!");
                statusDiv.className = "status connected";
                statusDiv.textContent = "✅ Connected to SignalR Hub";
                addUpdateLog("Connected to SignalR hub");
            })
            .catch(err => {
                console.error("❌ Connection Error:", err);
                statusDiv.className = "status error";
                statusDiv.textContent = "❌ Connection Failed: " + err.message;
                fullStateEl.textContent = "Connection failed. Make sure the backend is running on http://localhost:5018";
            });

        // Handle reconnection
        connection.onclose(async () => {
            console.log("🔌 Connection closed. Reconnecting...");
            statusDiv.className = "status connecting";
            statusDiv.textContent = "🔄 Reconnecting...";
            addUpdateLog("Connection lost. Reconnecting...");
            
            await new Promise(resolve => setTimeout(resolve, 5000));
            await connection.start();
        });
    </script>
</body>
</html>
